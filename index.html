<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie's Anywhere | Universal Hub</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-main: #0a0a0a; 
            --ma-blue: #0099ff;
            --amazon-orange: #ff9900;
            --yt-red: #ff0000;
            --goog-blue: #4285f4;
            --apple-grey: #555555;
            --fandango-orange: #ff7300;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main);
            color: #ffffff;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        #wp-custom-wrapper {
            width: 90%;
            max-width: 2800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
        }

        #top-counter-bar {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--ma-blue);
            padding: 10px 0; text-align: center; z-index: 1000;
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; gap: 12px;
        }

        #movie-count-badge {
            color: var(--ma-blue); font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase;
        }

        #sync-indicator {
            width: 10px; height: 10px; background: #333; border-radius: 50%;
            transition: all 0.4s ease;
        }
        .syncing #sync-indicator { 
            background: #00ff00; 
            box-shadow: 0 0 12px #00ff00;
            transform: scale(1.2);
        }

        #movie-container {
            width: 100%; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px;
            margin-top: 40px; margin-bottom: 60px;
        }

        .header-section { margin-top: 120px; text-align: center; }

        .search-wrapper {
            width: 100%; max-width: 600px; margin: 10px 0 30px 0;
        }

        #movie-search {
            width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #333;
            background: #151515; color: white; font-size: 1.1rem; outline: none;
            box-sizing: border-box;
        }

        .movie-card {
            background: linear-gradient(145deg, #1e1e1e, #111111);
            border: 1px solid #333; border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            transition: all 0.3s ease;
        }

        .movie-card:hover { transform: translateY(-8px); border-color: var(--ma-blue); }
        .poster-box { width: 100%; aspect-ratio: 2/3; background-color: #000; }
        .poster { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .card-content { padding: 12px; text-align: center; background: #141414; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; min-height: 2.5rem; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
        
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn { padding: 8px 2px; text-decoration: none; border-radius: 4px; font-size: 0.65rem; font-weight: 800; color: white; text-align: center; text-transform: uppercase; }
        
        .btn-amazon { background: var(--amazon-orange); color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .btn-google { background: var(--goog-blue); }
        .btn-youtube { background: var(--yt-red); }
        .btn-ma { background: var(--ma-blue); }
        .btn-apple { background: var(--apple-grey); }
        .btn-fandango { background: var(--fandango-orange); }

        @media (max-width: 768px) {
            #movie-container { grid-template-columns: 1fr; width: 100%; }
            .poster-box { aspect-ratio: 1/1; }
            #movie-search { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="top-counter-bar">
        <div id="sync-indicator"></div>
        <div id="movie-count-badge">Syncing Cinema Library...</div>
    </div>

    <div id="wp-custom-wrapper">
        <div class="header-section">
            <h1 style="font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; margin-bottom: 5px;">
                <span style="color: var(--ma-blue);">M</span><span style="color: var(--amazon-orange);">o</span><span style="color: var(--yt-red);">v</span><span style="color: var(--goog-blue);">i</span><span style="color: white;">e's</span> 
                <span style="color: var(--ma-blue);">A</span><span style="color: var(--amazon-orange);">n</span><span style="color: var(--yt-red);">y</span><span style="color: var(--goog-blue);">w</span><span style="color: var(--apple-grey);">h</span><span style="color: var(--ma-blue);">e</span><span style="color: var(--amazon-orange);">r</span><span style="color: var(--yt-red);">e</span>
            </h1>
        </div>

        <div class="search-wrapper">
            <input type="text" id="movie-search" placeholder="Filter library..." onkeyup="filterCollection()">
        </div>

        <div id="movie-container">Loading Library...</div>
    </div>

    <script>
        let movieLibraryMaster = []; 
        let libraryVersion = Date.now();
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbnwK6U18P1u1eAS8a_PqZzpOKxQ9AATL6RBH7CfxXQR10YPM63akRqxSDbNiXYJWs92tvobh6iqE7/pub?output=csv';
        const githubBase = 'https://raw.githubusercontent.com/KFruti88/Movies-Anywhere/main/images/';
        const amzTag = 'moviesanywhere02-20';
        const refreshRate = 120000; 

        function universalInit() {
            const bar = document.getElementById('top-counter-bar');
            bar.classList.add('syncing');

            const liveUrl = csvUrl + '&v=' + Date.now();
            
            Papa.parse(liveUrl, {
                download: true,
                header: true,
                skipEmptyLines: 'greedy',
                complete: function(results) { 
                    const newData = results.data.map(row => {
                        let cleanRow = {};
                        Object.keys(row).forEach(key => {
                            if (key) cleanRow[key.trim().toLowerCase()] = row[key];
                        });
                        return cleanRow;
                    }).filter(row => {
                        const title = getTitle(row);
                        return title && title !== "Unknown Title";
                    });

                    if (JSON.stringify(newData) !== JSON.stringify(movieLibraryMaster)) {
                        movieLibraryMaster = newData;
                        movieLibraryMaster.sort((a, b) => getTitle(a).localeCompare(getTitle(b)));
                        libraryVersion = Date.now();
                        renderMovies(movieLibraryMaster); 
                    }

                    setTimeout(() => bar.classList.remove('syncing'), 1000);
                }
            });
        }

        setInterval(universalInit, refreshRate);

        function getTitle(row) {
            return row['name'] || row['movie name'] || row['title'] || row['movie title'] || row['item'] || Object.values(row)[1] || "Unknown Title";
        }

        // New Aggressive Link Detector
        function getLink(row, searchTerms) {
            const rowKeys = Object.keys(row);
            for (let term of searchTerms) {
                const cleanTerm = term.toLowerCase().replace(/[^a-z0-9]/g, '');
                for (let actualKey of rowKeys) {
                    const cleanActual = actualKey.toLowerCase().replace(/[^a-z0-9]/g, '');
                    if (cleanActual.includes(cleanTerm)) {
                        let val = row[actualKey];
                        if (val && val.toString().trim() !== "" && val.toString().toUpperCase() !== "N/A") {
                            return val.toString().trim();
                        }
                    }
                }
            }
            return null;
        }

        function fixImageUrl(row) {
            let val = row['image'] || row['movie image'] || Object.values(row)[0] || '';
            let clean = val.toString().trim();
            if (clean === "" || clean.toUpperCase() === "N/A") return `https://placehold.co/400x600/1a1a1a/0099ff?text=Poster+Pending`;

            if (clean.includes('googleusercontent.com')) {
                if (!clean.includes('=') && !clean.includes('-')) {
                    clean = clean + '=w600';
                } else if (clean.includes('=')) {
                    clean = clean.split('=')[0] + '=w600';
                }
            }

            if (clean.includes('github.com')) {
                clean = clean.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/').replace('/tree/', '/');
            } else if (!clean.startsWith('http')) {
                clean = githubBase + clean;
            }
            return clean + (clean.includes('?') ? '&' : '?') + 'v=' + libraryVersion;
        }

        function renderMovies(data) {
            const container = document.getElementById('movie-container');
            const badge = document.getElementById('movie-count-badge');
            const searchInput = document.getElementById('movie-search');
            const searchVal = searchInput.value.toLowerCase();
            
            container.innerHTML = '';
            badge.innerText = `Library Synced: ${data.length} Titles`;
            searchInput.placeholder = `Filter ${data.length.toLocaleString()} items...`;

            data.forEach(row => {
                const name = getTitle(row);
                if (searchVal && !name.toLowerCase().includes(searchVal)) return;

                const amz = getLink(row, ['amazon', 'amz']);
                const goo = getLink(row, ['google', 'play']);
                const yt = getLink(row, ['youtube', 'yt']);
                const ma = getLink(row, ['anywhere', 'ma']);
                const apple = getLink(row, ['apple', 'itunes']);
                const fan = getLink(row, ['fandango', 'vudu']);

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${fixImageUrl(row)}" alt="${name}" class="poster" loading="lazy" onerror="this.src='https://placehold.co/400x600/1a1a1a/0099ff?text=Poster+Error'">
                    </div>
                    <div class="card-content">
                        <div class="title">${name}</div>
                        <div class="link-grid">
                            ${amz ? `<a href="${amz}${amz.includes('?') ? '&' : '?'}tag=${amzTag}" target="_blank" class="btn btn-amazon">Amazon</a>` : ''}
                            ${goo ? `<a href="${goo}" target="_blank" class="btn btn-google">Google</a>` : ''}
                            ${yt ? `<a href="${yt}" target="_blank" class="btn btn-youtube">YouTube</a>` : ''}
                            ${ma ? `<a href="${ma}" target="_blank" class="btn btn-ma">Anywhere</a>` : ''}
                            ${apple ? `<a href="${apple}" target="_blank" class="btn btn-apple">Apple TV</a>` : ''}
                            ${fan ? `<a href="${fan}" target="_blank" class="btn btn-fandango">Fandango</a>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCollection() {
            renderMovies(movieLibraryMaster);
        }

        window.onload = function() { setTimeout(universalInit, 300); };
    </script>
</body>
</html>
